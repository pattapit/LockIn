<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AthleteFuel 80/20</title>
  <style>
    :root {
      --purple: #4B2E83; /* Using your Husky Purple for consistency */
      --gold: #B7A57A;
      --primary: #2e7d32; 
      --junk: #b00020; 
      --bg: #f4f7f6;
      --card: #ffffff;
    }
    body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 16px; padding-bottom: 40px; }
    header { text-align: center; margin-bottom: 15px; }
    h1 { margin: 0; color: var(--purple); font-size: 22px; }
    
    .score-card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; margin-bottom: 15px; border: 1px solid #e6e6e6; }
    
    /* Percentage Bar */
    .progress-container { background: #eee; border-radius: 999px; height: 28px; margin: 12px 0; overflow: hidden; position: relative; border: 1px solid #ddd; }
    .progress-fill { background: linear-gradient(90deg, var(--primary), #81c784); height: 100%; transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .goal-line { position: absolute; left: 80%; top: 0; bottom: 0; width: 2px; background: rgba(0,0,0,0.4); z-index: 2; }
    
    .numbers { display: flex; justify-content: space-around; margin-top: 10px; }
    .num-box { flex: 1; }
    .num-box b { font-size: 24px; display: block; color: var(--purple); }
    .num-box span { font-size: 11px; color: #666; text-transform: uppercase; font-weight: bold; }

    /* Coaching Tip Box */
    #coach-box { background: #fffde7; border-left: 5px solid #fbc02d; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; font-style: italic; color: #555; min-height: 40px; display: flex; align-items: center; }

    /* Buttons */
    .fuel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .fuel-btn { border: none; border-radius: 14px; padding: 14px; font-weight: bold; color: white; cursor: pointer; text-align: left; position: relative; }
    .fuel-btn span { display: block; font-size: 10px; opacity: 0.8; margin-top: 4px; font-weight: normal; }
    
    .btn-protein { background: #1565c0; } 
    .btn-veggie { background: var(--primary); }  
    .btn-carb { background: #fbc02d; color: #333; }   
    .btn-junk { background: var(--junk); }
    .btn-water { background: #00acc1; grid-column: span 2; text-align: center; font-size: 18px; }

    .history { margin-top: 20px; background: white; border-radius: 12px; padding: 12px; border: 1px solid #e6e6e6; }
    .history-item { border-bottom: 1px solid #eee; padding: 6px 0; display: flex; justify-content: space-between; font-size: 13px; }
    .btn-reset { margin-top: 15px; width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: #fff; font-size: 12px; font-weight: bold; color: #999; }
  </style>
</head>
<body>

<header>
  <h1>Athlete Fuel Tracker</h1>
</header>

<main>
  <div class="score-card">
    <div id="status-msg" style="font-weight: 900; font-size: 16px; letter-spacing: 1px;">ELITE STATUS PENDING...</div>
    <div class="progress-container">
      <div class="goal-line"></div>
      <div id="bar" class="progress-fill" style="width: 0%"></div>
    </div>
    <div class="numbers">
      <div class="num-box"><b id="current-pct">0%</b><span>Fuel Grade</span></div>
      <div class="num-box"><b id="count-good">0</b><span>Performance</span></div>
      <div class="num-box"><b id="count-bad">0</b><span>Fun Fuel</span></div>
      <div class="num-box"><b id="count-water">0</b><span>Water</span></div>
    </div>
  </div>

  <div id="coach-box">"Fueling for a 13YO athlete is about power, not restriction. Let's get to 80%!"</div>

  <div class="fuel-grid">
    <button class="fuel-btn btn-protein" onclick="log('good', 'Protein', 'Nice! Protein repairs your muscles after soccer.')">
      🍗 Protein
      <span>Fist-sized portion</span>
    </button>
    <button class="fuel-btn btn-veggie" onclick="log('good', 'Veg/Fruit', 'Fiber hack! This keeps your energy stable.')">
      🥕 Veggie/Fruit
      <span>Carrots, Cukes, Berries</span>
    </button>
    <button class="fuel-btn btn-carb" onclick="log('good', 'Athletic Carb', 'Energy loading! Pair this with protein for a slim waist.')">
      🍚 Athletic Carb
      <span>Rice, Pasta, Potato</span>
    </button>
    <button class="fuel-btn btn-junk" onclick="log('bad', 'Fun Fuel', 'Enjoy it! Drink a glass of water to balance the sugar spike.')">
      🍭 Fun Fuel
      <span>Candy, Soda, Junk</span>
    </button>
    <button class="fuel-btn btn-water" onclick="log('water', 'Water', 'Hydration = Focus. 8oz logged!')">
      💧 Drink 8oz Water
    </button>
  </div>

  <div class="history">
    <b style="font-size: 14px; color: var(--purple);">Activity Log</b>
    <div id="log-list" style="margin-top:8px;"></div>
  </div>

  <button class="btn-reset" onclick="resetDay()">Reset for New Day</button>
  <div style="text-align:center; margin-top:10px; font-size:10px; color:#aaa;">Undo: Refresh page to clear mistakes before reset.</div>
</main>

<script>
  let logs = JSON.parse(localStorage.getItem('athlete_fuel_data') || '[]');

  function log(type, name, tip) {
    logs.push({ type, name, tip, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
    update();
  }

  function resetDay() {
    if(confirm("Start a new day? Stats will reset to zero.")) {
      logs = [];
      update();
    }
  }

  function update() {
    localStorage.setItem('athlete_fuel_data', JSON.stringify(logs));
    
    const good = logs.filter(l => l.type === 'good').length;
    const bad = logs.filter(l => l.type === 'bad').length;
    const water = logs.filter(l => l.type === 'water').length;
    const total = good + bad;
    
    const pct = total === 0 ? 0 : Math.round((good / total) * 100);
    
    document.getElementById('bar').style.width = pct + '%';
    document.getElementById('current-pct').innerText = pct + '%';
    document.getElementById('count-good').innerText = good;
    document.getElementById('count-bad').innerText = bad;
    document.getElementById('count-water').innerText = water;
    
    // UI Feedback
    const msg = document.getElementById('status-msg');
    const coach = document.getElementById('coach-box');

    if (total === 0) {
        msg.innerText = "READY TO FUEL?";
        msg.style.color = "#999";
    } else if (pct >= 80) { 
        msg.innerText = "🔥 ELITE ATHLETE STATUS"; 
        msg.style.color = "var(--primary)"; 
    } else { 
        msg.innerText = "💪 REFUELING..."; 
        msg.style.color = "var(--gold)"; 
    }

    if(logs.length > 0) {
        coach.innerHTML = `"${logs[logs.length - 1].tip}"`;
    }

    const list = document.getElementById('log-list');
    list.innerHTML = logs.slice(-5).reverse().map(l => 
      `<div class="history-item">
        <b>${l.name}</b>
        <span>${l.time}</span>
      </div>`
    ).join('') || "No logs yet today.";
  }

  update();
</script>
</body>
</html>
